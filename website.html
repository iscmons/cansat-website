<!DOCTYPE html>
<html>
<head>
  <title>BME280 Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Temperature</h2>
<canvas id="tempChart" width="200" height="100"></canvas>

<h2>Pressure</h2>
<canvas id="pressureChart" width="200" height="100"></canvas>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";


  const firebaseConfig = {

    apiKey: "AIzaSyDmm2-KvAMy438nQAx3euZlnbf35s9Le6Y",

    authDomain: "mytest2-35631.firebaseapp.com",

    databaseURL: "https://mytest2-35631-default-rtdb.europe-west1.firebasedatabase.app",

    projectId: "mytest2-35631",

    storageBucket: "mytest2-35631.firebasestorage.app",

    messagingSenderId: "454778637641",

    appId: "1:454778637641:web:a7c2993285b10e9b9b1e98"

  };


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ctx_temp = document.getElementById('tempChart').getContext('2d');
const ctx_pressure = document.getElementById('pressureChart').getContext('2d');



let data_temp = {
  labels: [],
  datasets: [{
    label: 'Température °C',
    data: [],
    borderColor: 'red'
  }]
};

let data_pressure = {
  labels: [],
  datasets: [{
    label: 'Pressure hPa',
    data: [],
    borderColor: 'blue'
  }]
};

const chart_temp = new Chart(ctx_temp, {
  type: 'line',
  data: data_temp
});


const chart_pressure = new Chart(ctx_pressure, {
  type: 'line',
  data: data_pressure
});

// Lire les données Firebase
const temperatureRef = ref(db, 'Cansat2027/data/temp');
const pressureRef = ref(db, 'Cansat2027/data/pressure');

onValue(temperatureRef, (snapshot) => {
  const value = snapshot.val();

  data_temp.labels.push(new Date().toLocaleTimeString());
  data_temp.datasets[0].data.push(value);

  if (data_temp.labels.length > 20) {
    data_temp.labels.shift();
    data_temp.datasets[0].data.shift();
  }

  chart_temp.update();
});

onValue(pressureRef, (snapshot) => {
  const value = snapshot.val();

  data_pressure.labels.push(new Date().toLocaleTimeString());
  data_pressure.datasets[0].data.push(value);

  if (data_pressure.labels.length > 20) {
    data_pressure.labels.shift();
    data_pressure.datasets[0].data.shift();
  }

  chart_pressure.update();
});

</script>

</body>
</html>
